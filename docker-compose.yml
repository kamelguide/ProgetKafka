version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    container_name: soc-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: soc-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  incident-service:
    build:
      context: ./incident-service
      dockerfile: Dockerfile
    container_name: soc-incident-service
    ports:
      - "50051:50051"
    depends_on:
      - kafka
    environment:
      - PORT=50051
      - KAFKA_BROKER=kafka:29092
      - DATABASE_URL=/usr/src/app/data/incidents.db
      - PROTO_PATH=/usr/src/proto/incident.proto
    volumes:
      - ./proto:/usr/src/proto
      - incident-db:/usr/src/app/data

  alert-service:
    build:
      context: ./alert-service
      dockerfile: Dockerfile
    container_name: soc-alert-service
    ports:
      - "50052:50052"
    depends_on:
      - kafka
      - incident-service
    environment:
      - PORT=50052
      - KAFKA_BROKER=kafka:29092
      - DATABASE_URL=/usr/src/app/data/alerts.db
      - PROTO_PATH=/usr/src/proto/alert.proto
    volumes:
      - ./proto:/usr/src/proto
      - alert-db:/usr/src/app/data

  notification-service:
    build:
      context: ./notification-service
      dockerfile: Dockerfile
    container_name: soc-notification-service
    ports:
      - "50053:50053"
    depends_on:
      - kafka
      - alert-service
    environment:
      - PORT=50053
      - KAFKA_BROKER=kafka:29092
      - DATABASE_URL=/usr/src/app/data/notifications.db
      - PROTO_PATH=/usr/src/proto/notification.proto
    volumes:
      - ./proto:/usr/src/proto
      - notification-db:/usr/src/app/data

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: soc-api-gateway
    ports:
      - "4000:4000"
    depends_on:
      - incident-service
      - alert-service
      - notification-service
    environment:
      - PORT=4000
      - INCIDENT_SERVICE_URL=incident-service:50051
      - ALERT_SERVICE_URL=alert-service:50052
      - NOTIFICATION_SERVICE_URL=notification-service:50053
      - INCIDENT_PROTO_PATH=/usr/src/proto/incident.proto
      - ALERT_PROTO_PATH=/usr/src/proto/alert.proto
      - NOTIFICATION_PROTO_PATH=/usr/src/proto/notification.proto
    volumes:
      - ./proto:/usr/src/proto

volumes:
  incident-db:
  alert-db:
  notification-db:
