syntax = "proto3";

package incident;

service IncidentService {
  rpc CreateIncident (CreateIncidentRequest) returns (IncidentResponse);
  rpc GetIncident (GetIncidentRequest) returns (IncidentResponse);
  rpc ListIncidents (ListIncidentsRequest) returns (ListIncidentsResponse);
  rpc UpdateIncidentStatus (UpdateIncidentStatusRequest) returns (IncidentResponse);
}

message CreateIncidentRequest {
  string title = 1;
  string description = 2;
  string severity = 3; // LOW, MEDIUM, HIGH, CRITICAL
}

message IncidentResponse {
  string id = 1;
  string title = 2;
  string description = 3;
  string severity = 4;
  string status = 5; // OPEN, INVESTIGATING, RESOLVED, CLOSED
  string createdAt = 6;
}

message GetIncidentRequest {
  string id = 1;
}

message ListIncidentsRequest {}

message ListIncidentsResponse {
  repeated IncidentResponse incidents = 1;
}

message UpdateIncidentStatusRequest {
  string id = 1;
  string status = 2;
}
